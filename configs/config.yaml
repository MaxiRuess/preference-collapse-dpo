# Preference Collapse — Political Distribution Aggregation

# --- Paths ---
paths:
  data_dir: "data"
  models_dir: "models"
  politune_datasets_dir: "data/politune_datasets"
  figures_dir: "data/figures"
  eval_results_file: "data/eval_results.json"

# --- PoliTune Data ---
politune:
  left_dataset: "scale-lab/politune-left"
  right_dataset: "scale-lab/politune-right"

# --- Dataset Construction ---
datasets:
  train_split: 0.9
  eval_split: 0.1
  seed: 42

# --- Training ---
training:
  base_model: "mistralai/Mistral-7B-v0.1"
  sft_base_model: "mistralai/Mistral-7B-Instruct-v0.2"

  # QLoRA config
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "v_proj"

  # SFT hyperparameters
  sft:
    learning_rate: 2.0e-4
    num_epochs: 2
    per_device_batch_size: 4
    gradient_accumulation_steps: 2
    max_length: 2048
    warmup_ratio: 0.1

  seed: 42
  wandb_project: "preference-collapse-dpo"

# --- Evaluation ---
evaluation:
  judge_model: "gpt-5.4"
  second_judge_model: "gemini-3-flash-preview"
  judge_temperature: 0.0
  generation_temperature: 0.7
  generation_max_tokens: 1024
  num_eval_samples: null
