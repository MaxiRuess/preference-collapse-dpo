# Preference Collapse — Political Distribution Aggregation
# Copy to config.yaml before running.

# --- Paths ---
paths:
  data_dir: "data"
  models_dir: "models"
  politune_datasets_dir: "data/politune_datasets"
  figures_dir: "data/figures"
  eval_results_file: "data/eval_results.json"

# --- PoliTune Data ---
politune:
  left_dataset: "scale-lab/politune-left"
  right_dataset: "scale-lab/politune-right"

# --- Dataset Construction ---
datasets:
  train_split: 0.9
  eval_split: 0.1
  seed: 42

# --- Training ---
training:
  base_model: "mistralai/Mistral-7B-v0.1"
  sft_base_model: "mistralai/Mistral-7B-Instruct-v0.2"  # Pre-built instruct model (base for both SFT and DPO)

  # QLoRA config (Zephyr recipe)
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "v_proj"

  # SFT hyperparameters (Stage 1: UltraChat, Stage 2: PoliTune ideology)
  sft:
    learning_rate: 2.0e-4
    num_epochs: 2               # 2 epochs for ideology SFT
    per_device_batch_size: 4
    gradient_accumulation_steps: 2
    max_length: 2048
    warmup_ratio: 0.1
    subset_size: 20000          # UltraChat subset size for Stage 1

  # DPO/IPO hyperparameters
  dpo_beta: 0.1
  learning_rate: 5.0e-6
  num_epochs: 2
  loss_type: "ipo"              # IPO loss resists overfitting on small deterministic datasets
  warmup_ratio: 0.1             # Used to calculate warmup_steps (warmup_ratio deprecated in TRL v5.2)
  per_device_batch_size: 4
  gradient_accumulation_steps: 16
  max_length: 2048
  logging_steps: 10
  save_strategy: "epoch"
  seed: 42
  wandb_project: "preference-collapse-dpo"  # Set to null to disable W&B

# --- Evaluation ---
evaluation:
  judge_model: "gpt-5.4"
  judge_temperature: 0.0
  generation_temperature: 0.7
  generation_max_tokens: 1024
  num_eval_samples: null        # null = use all eval data
